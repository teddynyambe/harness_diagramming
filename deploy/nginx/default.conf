server {
    listen 80;
    server_name _;

    # allow large configs / image uploads
    client_max_body_size 50m;

    # static frontend (the project folder mounted read-only)
    root /usr/share/nginx/html;
    index index.html;

    # API -> FastAPI (uvicorn) container
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # never expose the backend code / data / backups over http
    location ^~ /deploy/ { deny all; return 404; }
    location ~ /\.        { deny all; return 404; }

    # always serve fresh app code so edits show on a normal refresh (no stale JS)
    location ~* \.(?:html|js)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # everything else is a static file (PDF/images)
    location / {
        try_files $uri $uri/ =404;
    }

    # --- future auth options (uncomment one) ---
    # 1) quick gate at the edge:
    #   auth_basic "Harness";
    #   auth_basic_user_file /etc/nginx/.htpasswd;
    # 2) for real RBAC, leave nginx open and enforce in FastAPI (HARNESS_AUTH_DISABLED=false)
}
